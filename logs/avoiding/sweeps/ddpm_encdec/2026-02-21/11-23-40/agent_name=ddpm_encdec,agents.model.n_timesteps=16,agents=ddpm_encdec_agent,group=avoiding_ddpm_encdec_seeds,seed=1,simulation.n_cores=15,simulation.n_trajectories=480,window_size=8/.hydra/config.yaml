agents:
  _target_: agents.ddpm_encdec_agent.DiffusionAgent
  _recursive_: false
  action_seq_size: 4
  obs_seq_len: 5
  model:
    _target_: agents.models.diffusion.diffusion_policy.Diffusion
    _recursive_: false
    state_dim: ${obs_dim}
    action_dim: ${action_dim}
    beta_schedule: cosine
    n_timesteps: 16
    loss_type: l2
    clip_denoised: true
    predict_epsilon: true
    device: ${device}
    diffusion_x: false
    diffusion_x_M: 10
    model:
      _target_: agents.models.diffusion.diffusion_models.DiffusionEncDec
      _recursive_: false
      state_dim: ${obs_dim}
      action_dim: ${action_dim}
      goal_conditioned: false
      goal_seq_len: 10
      obs_seq_len: 5
      action_seq_len: 4
      embed_pdrob: 0
      embed_dim: 64
      device: ${device}
      linear_output: true
      encoder:
        _target_: agents.models.act.act_vae.TransformerEncoder
        embed_dim: 64
        n_heads: 4
        n_layers: 2
        attn_pdrop: 0.1
        resid_pdrop: 0.1
        bias: false
        block_size: ${add:${window_size}, 1}
      decoder:
        _target_: agents.models.act.act_vae.TransformerDecoder
        embed_dim: 64
        cross_embed: 64
        n_heads: 4
        n_layers: 4
        attn_pdrop: 0.1
        resid_pdrop: 0.1
        bias: false
        block_size: ${add:${window_size}, 1}
  optimization:
    _target_: torch.optim.Adam
    lr: 0.0005
    weight_decay: 0
  trainset: ${trainset}
  valset: ${valset}
  train_batch_size: ${train_batch_size}
  val_batch_size: ${val_batch_size}
  num_workers: ${num_workers}
  epoch: ${epoch}
  device: ${device}
  scale_data: ${scale_data}
  eval_every_n_epochs: ${eval_every_n_epochs}
  discount: 0.99
  use_ema: true
  decay: 0.995
  update_ema_every_n_steps: 1
  goal_window_size: 1
  window_size: ${window_size}
  diffusion_kde: false
  diffusion_kde_samples: 100
  goal_conditioned: false
agent_name: ddpm_encdec
log_dir: logs/avoiding/
data_directory: environments/dataset/data/avoiding/data
wandb:
  entity: davidjia
  project: d3il
group: avoiding_ddpm_encdec_seeds
seed: 1
hidden_dim: 128
num_hidden_layers: 6
n_layer: 4
n_head: 4
n_embd: 72
train_batch_size: 1024
val_batch_size: 1024
num_workers: 4
device: cuda
epoch: 1500
eval_every_n_epochs: 150
scale_data: true
obs_dim: 4
action_dim: 2
max_len_data: 200
window_size: 8
trainset:
  _target_: environments.dataset.avoiding_dataset.Avoiding_Dataset
  data_directory: ${data_directory}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  max_len_data: ${max_len_data}
  window_size: ${window_size}
valset:
  _target_: environments.dataset.avoiding_dataset.Avoiding_Dataset
  data_directory: ${data_directory}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  max_len_data: ${max_len_data}
  window_size: ${window_size}
simulation:
  _target_: simulation.avoiding_sim.Avoiding_Sim
  seed: ${seed}
  device: ${device}
  render: true
  n_cores: 15
  n_trajectories: 480
