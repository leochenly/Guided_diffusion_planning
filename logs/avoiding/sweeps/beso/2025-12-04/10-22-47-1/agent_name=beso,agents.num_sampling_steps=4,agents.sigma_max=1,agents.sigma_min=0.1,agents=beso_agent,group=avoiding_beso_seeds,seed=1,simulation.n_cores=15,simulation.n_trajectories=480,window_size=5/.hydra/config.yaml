agents:
  _target_: agents.beso_agent.BesoAgent
  _recursive_: false
  model:
    _target_: agents.models.beso.agents.diffusion_agents.k_diffusion.score_wrappers.GCDenoiser
    _recursive_: false
    sigma_data: 0.5
    inner_model:
      _target_: agents.models.beso.agents.diffusion_agents.k_diffusion.score_gpts.DiffusionGPT
      state_dim: ${obs_dim}
      action_dim: ${action_dim}
      goal_conditioned: false
      goal_seq_len: 10
      obs_seq_len: ${window_size}
      sigma_vocab_size: 8
      embed_pdrob: 0
      goal_drop: 0
      attn_pdrop: 0.2
      resid_pdrop: 0.1
      time_embedding_fn:
        _target_: agents.models.beso.agents.diffusion_agents.k_diffusion.utils.return_time_sigma_embedding_model
        embedding_type: Linear
        time_embed_dim: ${n_embd}
        device: ${device}
      embed_dim: ${n_embd}
      n_layers: ${n_layer}
      n_heads: ${n_head}
      device: ${device}
      linear_output: true
  optimization:
    _target_: torch.optim.Adam
    lr: 0.0005
    weight_decay: 0
  lr_scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 100
    gamma: 0.99
  trainset: ${trainset}
  valset: ${valset}
  train_batch_size: ${train_batch_size}
  val_batch_size: ${val_batch_size}
  num_workers: ${num_workers}
  epoch: ${epoch}
  device: ${device}
  scale_data: ${scale_data}
  eval_every_n_epochs: ${eval_every_n_epochs}
  use_ema: true
  decay: 0.999
  update_ema_every_n_steps: 1
  goal_window_size: 1
  window_size: ${window_size}
  goal_conditioned: false
  pred_last_action_only: false
  num_sampling_steps: 4
  sampler_type: euler_ancestral
  sigma_data: 0.5
  rho: 5.0
  sigma_min: 0.1
  sigma_max: 1
  sigma_sample_density_type: loglogistic
  sigma_sample_density_mean: -0.6
  sigma_sample_density_std: 1.6
agent_name: beso
log_dir: logs/avoiding/
data_directory: environments/dataset/data/avoiding/data
wandb:
  entity: davidjia
  project: d3il
group: avoiding_beso_seeds
seed: 1
hidden_dim: 128
num_hidden_layers: 6
n_layer: 4
n_head: 4
n_embd: 72
train_batch_size: 1024
val_batch_size: 1024
num_workers: 4
device: cuda
epoch: 2500
eval_every_n_epochs: 250
scale_data: true
obs_dim: 4
action_dim: 2
max_len_data: 200
window_size: 5
trainset:
  _target_: environments.dataset.avoiding_dataset.Avoiding_Dataset
  data_directory: ${data_directory}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  max_len_data: ${max_len_data}
  window_size: ${window_size}
valset:
  _target_: environments.dataset.avoiding_dataset.Avoiding_Dataset
  data_directory: ${data_directory}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  max_len_data: ${max_len_data}
  window_size: ${window_size}
simulation:
  _target_: simulation.avoiding_sim.Avoiding_Sim
  seed: ${seed}
  device: ${device}
  render: true
  n_cores: 15
  n_trajectories: 480
